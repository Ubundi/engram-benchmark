name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check benchmark tests
          ruff format --check benchmark tests

      - name: Test
        run: pytest

  validate-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" huggingface_hub

      - name: Fetch datasets from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -c "from benchmark.tasks.hf import fetch_engram_dataset, fetch_engram_test_dataset; fetch_engram_dataset(); fetch_engram_test_dataset()"

      - name: Validate full dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/ci_validate_hf_dataset.py
